<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静态漫 - AI漫画短片生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            min-height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .flow-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 12px 16px;
            background: rgba(55, 65, 81, 0.5);
            border: 1px solid rgba(75, 85, 99, 0.5);
            border-radius: 8px;
            color: #d1d5db;
            font-weight: 500;
            transition: all 0.3s;
            cursor: pointer;
            margin-bottom: 8px;
        }
        .flow-btn:hover:not(:disabled) {
            background: rgba(75, 85, 99, 0.7);
            border-color: #60a5fa;
        }
        .flow-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .flow-btn.active {
            background: rgba(59, 130, 246, 0.3);
            border-color: #3b82f6;
        }
        .flow-btn.completed {
            background: rgba(34, 197, 94, 0.2);
            border-color: #22c55e;
        }
        .step-num {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.success { background: #22c55e; }
        .status-dot.error { background: #ef4444; }
        .status-dot.pending { background: #f59e0b; animation: pulse 1s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .shot-card {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(75, 85, 99, 0.5);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
        }
        .shot-card:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
        }
        .shot-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #1f2937;
        }
        .grid-layout-horizontal {
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)) !important;
        }
        .grid-layout-vertical {
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)) !important;
        }
        .aspect-horizontal {
            aspect-ratio: 16/9;
            object-fit: cover;
        }
        .aspect-vertical {
            aspect-ratio: 9/16;
            object-fit: cover;
            max-height: 400px;
        }
        .log-panel {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            overflow-y: auto;
            max-height: 200px;
        }
        .log-entry { padding: 4px 12px; border-bottom: 1px solid #21262d; }
        .log-entry.info { color: #58a6ff; }
        .log-entry.success { color: #3fb950; }
        .log-entry.error { color: #f85149; }
        .log-entry.warn { color: #d29922; }
        .progress-bar {
            height: 4px;
            background: #374151;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transition: width 0.3s;
        }
        .animation-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(139, 92, 246, 0.3);
            color: #a78bfa;
        }
    </style>
</head>
<body class="text-gray-200">
    <!-- 顶部导航 -->
    <header class="h-14 bg-gray-900/80 border-b border-gray-700 flex items-center justify-between px-6 backdrop-blur-sm">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🎬</span>
            <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                静态漫 - AI漫画短片生成器
            </h1>
        </div>
        <div class="flex items-center gap-4 text-sm">
            <div class="flex items-center gap-2">
                <span id="status-ollama" class="status-dot pending"></span>
                <span>LLM</span>
            </div>
            <div class="flex items-center gap-2">
                <span id="status-comfyui" class="status-dot pending"></span>
                <span>ComfyUI</span>
            </div>
            <div class="flex items-center gap-2">
                <span id="status-tts" class="status-dot pending"></span>
                <span>CosyVoice</span>
            </div>
            <div class="flex items-center gap-2">
                <span id="status-server" class="status-dot pending"></span>
                <span>合成服务</span>
            </div>
        </div>
    </header>

    <main class="flex h-[calc(100vh-56px)]">
        <!-- 左栏：控制面板 -->
        <div class="w-80 border-r border-gray-700 flex flex-col bg-gray-900/50 overflow-y-auto">
            <div class="p-4 border-b border-gray-700">
                <h2 class="text-lg font-bold mb-4">⚙️ 配置</h2>
                
                <!-- 服务配置 -->
                <div class="space-y-3 text-sm">
                    <!-- LLM 提供者 -->
                    <div>
                        <label class="text-gray-400 block mb-1">LLM 服务</label>
                        <div class="flex gap-2">
                            <select id="llm-provider" class="flex-1 bg-gray-700 rounded px-3 py-2 border border-gray-600">
                                <option value="ollama">Ollama (本地)</option>
                                <option value="lmstudio">LM Studio (本地)</option>
                                <option value="vllm">vLLM (本地)</option>
                                <option value="remote-vllm">Remote vLLM (192.168.1.5)</option>
                                <option value="deepseek">DeepSeek (在线)</option>
                                <option value="custom">自定义</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- API URL -->
                    <div>
                        <label class="text-gray-400 block mb-1">API 地址</label>
                        <input type="text" id="llm-url" value="http://localhost:11434" 
                            class="w-full bg-gray-700 rounded px-3 py-2 border border-gray-600 focus:border-blue-500 outline-none text-xs">
                    </div>
                    
                    <!-- API Key (仅在线/自定义显示) -->
                    <div id="api-key-row" class="hidden">
                        <label class="text-gray-400 block mb-1">API Key</label>
                        <input type="password" id="llm-api-key" placeholder="sk-..." 
                            class="w-full bg-gray-700 rounded px-3 py-2 border border-gray-600 focus:border-blue-500 outline-none">
                    </div>
                    
                    <!-- 模型选择 -->
                    <div>
                        <label class="text-gray-400 block mb-1">模型</label>
                        <div class="flex gap-2">
                            <select id="llm-model" class="flex-1 bg-gray-700 rounded px-3 py-2 border border-gray-600">
                                <option value="">-- 点击刷新获取 --</option>
                            </select>
                            <button onclick="fetchModels()" class="px-3 py-2 bg-blue-600 hover:bg-blue-700 rounded text-sm" title="刷新模型列表">
                                🔄
                            </button>
                        </div>
                    </div>
                    <div>
                        <label class="text-gray-400 block mb-1">风格描述</label>
                        <select id="style-preset" onchange="applyStylePreset()" class="w-full bg-gray-700 rounded px-3 py-2 border border-gray-600 focus:border-blue-500 outline-none mb-2">
                            <option value="">-- 选择预设风格 --</option>
                            <option value="扁平插画，MG动画，简约精美">扁平插画，MG动画，简约精美</option>
                            <option value="钢笔浓彩日系治愈风，高饱和清透影调，糅合江南水乡与瑞士田园的生机美学">钢笔浓彩日系治愈风，高饱和清透影调，糅合江南水乡与瑞士田园的生机美学</option>
                            <option value="倪传婧风格抽象插画：繁复金边荧光线稿，纯黑背景，奢华国风奇幻装饰艺术">倪传婧风格抽象插画：繁复金边荧光线稿，纯黑背景，奢华国风奇幻装饰艺术</option>
                            <option value="3D多巴胺数字艺术：清新明亮影调，灵动丁达尔光效，高级型格美学">3D多巴胺数字艺术：清新明亮影调，灵动丁达尔光效，高级型格美学</option>
                            <option value="极简深黑背景流光风：虚实朦胧颗粒肌理，冷暖微光对比，梦幻高雅意境">极简深黑背景流光风：虚实朦胧颗粒肌理，冷暖微光对比，梦幻高雅意境</option>
                            <option value="极简扁平MG插画风：Q版比例，纯净背景，活泼利落的矢量质感">极简扁平MG插画风：Q版比例，纯净背景，活泼利落的矢量质感</option>
                            <option value="新国风荧光手卷：3D移轴微缩景观，纯色仪式感背景，史诗级体积光影">新国风荧光手卷：3D移轴微缩景观，纯色仪式感背景，史诗级体积光影</option>
                            <option value="新中式弥散渐变海报风：磨砂颗粒肌理，工笔造型结合精致衬线体排版">新中式弥散渐变海报风：磨砂颗粒肌理，工笔造型结合精致衬线体排版</option>
                            <option value="极简抽象禅意水墨风：宣纸质感大幅留白，灵动水晕结合简约墨线勾勒">极简抽象禅意水墨风：宣纸质感大幅留白，灵动水晕结合简约墨线勾勒</option>
                            <option value="纯黑白点彩水墨风：抽象晕染结合极致留白，流动渐变质感，极简深邃意境">纯黑白点彩水墨风：抽象晕染结合极致留白，流动渐变质感，极简深邃意境</option>
                            <option value="3D写意华丽水墨风：湿笔金银晕染，粗颗粒动感，戏剧化繁复美学">3D写意华丽水墨风：湿笔金银晕染，粗颗粒动感，戏剧化繁复美学</option>
                            <option value="3D立体镂空剪纸风：传统民俗纹样，利落线条与多层重叠的空间质感">3D立体镂空剪纸风：传统民俗纹样，利落线条与多层重叠的空间质感</option>
                            <option value="3D立体微缩剪纸风：细腻纸艺镂空层次，极简背景与手工雕琢质感">3D立体微缩剪纸风：细腻纸艺镂空层次，极简背景与手工雕琢质感</option>
                        </select>
                        <input type="text" id="style-desc" value="封面插画风，强烈动态张力构图，硬朗边缘线稿+漫画式阴影分层" 
                            class="w-full bg-gray-700 rounded px-3 py-2 border border-gray-600 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-gray-400 block mb-1">时代背景</label>
                        <select id="context-preset" onchange="applyContextPreset()" class="w-full bg-gray-700 rounded px-3 py-2 border border-gray-600 focus:border-blue-500 outline-none mb-2">
                            <option value="">-- 选择预设时代 --</option>
                            <option value="中国当代都市">中国当代都市</option>
                            <option value="中国古代">中国古代</option>
                            <option value="中国古代宫廷">中国古代宫廷</option>
                            <option value="中国古代武侠江湖">中国古代武侠江湖</option>
                            <option value="中国古代江南水乡">中国古代江南水乡</option>
                            <option value="中国古代塞北边关">中国古代塞北边关</option>
                            <option value="中国古代仙侠玄幻">中国古代仙侠玄幻</option>
                            <option value="中国民国时期">中国民国时期</option>
                            <option value="中国80-90年代">中国80-90年代</option>
                            <option value="日本当代都市">日本当代都市</option>
                            <option value="日本古代京都">日本古代京都</option>
                            <option value="日本战国时代">日本战国时代</option>
                            <option value="欧洲中世纪">欧洲中世纪</option>
                            <option value="欧洲文艺复兴">欧洲文艺复兴</option>
                            <option value="欧洲维多利亚时代">欧洲维多利亚时代</option>
                            <option value="美国现代都市">美国现代都市</option>
                            <option value="美国西部牛仔">美国西部牛仔</option>
                            <option value="美国赛博朋克未来">美国赛博朋克未来</option>
                            <option value="科幻太空未来">科幻太空未来</option>
                            <option value="奇幻魔法世界">奇幻魔法世界</option>
                            <option value="末日废土">末日废土</option>
                            <option value="童话幻想世界">童话幻想世界</option>
                            <option value="热带海岛">热带海岛</option>
                            <option value="北欧冰雪世界">北欧冰雪世界</option>
                        </select>
                        <input type="text" id="context-bg" value="中国当代都市" 
                            class="w-full bg-gray-700 rounded px-3 py-2 border border-gray-600 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-gray-400 block mb-1">图片尺寸</label>
                        <select id="image-size" class="w-full bg-gray-700 rounded px-3 py-2 border border-gray-600">
                            <option value="1080x1920" selected>1080×1920 (竖屏)</option>
                            <option value="1920x1080">1920×1080 (横屏)</option>
                            <option value="1280x720">1280×720 (横屏-低配)</option>
                            <option value="720x1280">720×1280 (竖屏-低配)</option>
                            <option value="960x544">960×544 (16:9)</option>
                            <option value="832x480">832×480 (16:9)</option>
                            <option value="768x512">768×512 (3:2)</option>
                            <option value="512x768">512×768 (2:3 竖版)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-gray-400 block mb-1">BGM音乐（可选）</label>
                        <input type="file" id="bgm-file" accept="audio/*"
                            class="w-full bg-gray-700 rounded px-3 py-2 border border-gray-600 text-sm">
                        <div class="flex items-center gap-2 mt-2">
                            <input type="range" id="bgm-volume" min="0" max="100" value="30" class="flex-1">
                            <span class="text-xs text-gray-400" id="bgm-volume-label">30%</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="enable-subtitle" checked class="rounded w-4 h-4">
                        <label for="enable-subtitle" class="text-gray-400 text-sm">添加字幕</label>
                    </div>
                    <div class="flex items-center gap-4">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="is-lyrics" class="rounded w-4 h-4">
                            <span class="text-gray-400 text-sm">歌词模式</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="skip-rewrite" class="rounded w-4 h-4">
                            <span class="text-gray-400 text-sm">跳过改写</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- TTS 设置 -->
            <div class="p-4 border-b border-gray-700">
                <label class="text-gray-400 block mb-2 font-medium">🎙️ TTS 语音设置</label>
                
                <!-- TTS服务地址 -->
                <div class="mb-2">
                    <label class="text-gray-500 text-xs block mb-1">服务地址</label>
                    <input type="text" id="tts-url" value="http://127.0.0.1:7860" 
                        class="w-full bg-gray-700 rounded px-3 py-2 border border-gray-600 text-xs">
                </div>
                
                <!-- 参考音频来源 -->
                <div class="flex items-center gap-3 mb-2 text-xs">
                    <span class="text-gray-500">参考音频:</span>
                    <label class="flex items-center gap-1 cursor-pointer">
                        <input type="radio" name="tts-audio-source" value="server" checked class="w-3 h-3">
                        <span>服务器</span>
                    </label>
                    <label class="flex items-center gap-1 cursor-pointer">
                        <input type="radio" name="tts-audio-source" value="upload" class="w-3 h-3">
                        <span>上传</span>
                    </label>
                </div>
                
                <!-- 服务器音频选择 -->
                <div id="tts-server-section">
                    <div class="flex gap-1 mb-2">
                        <select id="tts-ref-audio" class="flex-1 bg-gray-700 rounded px-2 py-1.5 border border-gray-600 text-xs">
                            <option value="">-- 点击刷新加载 --</option>
                        </select>
                        <button onclick="refreshTTSAudios()" class="px-2 py-1 bg-blue-600 hover:bg-blue-700 rounded text-xs" title="刷新">🔄</button>
                        <button onclick="previewTTSAudio()" class="px-2 py-1 bg-gray-600 hover:bg-gray-500 rounded text-xs" title="试听">▶️</button>
                    </div>
                    <div id="tts-server-text-section" class="hidden">
                        <input type="text" id="tts-prompt-text" readonly
                            class="w-full bg-gray-800 px-2 py-1 rounded text-xs text-gray-500"
                            placeholder="选择音频后自动填充参考文本">
                    </div>
                </div>
                
                <!-- 上传音频 -->
                <div id="tts-upload-section" class="hidden">
                    <input type="file" id="tts-upload-audio" accept="audio/*" 
                        class="w-full bg-gray-700 rounded px-2 py-1 border border-gray-600 text-xs mb-2">
                    <input type="text" id="tts-upload-text" 
                        class="w-full bg-gray-700 px-2 py-1 rounded text-xs"
                        placeholder="参考音频对应的文本（必填）">
                </div>
                
                <!-- 合成模式 -->
                <div class="flex items-center gap-2 mt-2 text-xs">
                    <span class="text-gray-500">模式:</span>
                    <select id="tts-mode" class="bg-gray-700 px-2 py-1 rounded border border-gray-600 text-xs">
                        <option value="zero_shot">音色克隆</option>
                        <option value="cross_lingual">跨语言</option>
                    </select>
                </div>
                
                <!-- 音频预览播放器 -->
                <audio id="tts-audio-preview" class="w-full h-6 mt-2" style="display:none;" controls></audio>
            </div>
            
            <!-- 四步走流程 -->
            <div class="p-4 border-b border-gray-700">
                <h3 class="text-sm font-medium mb-3 text-gray-400">📋 制作流程（四步走）</h3>
                
                <!-- 低显存模式开关 -->
                <div class="mb-3 flex items-center">
                    <input type="checkbox" id="low-vram-mode" class="mr-2 h-4 w-4 text-blue-600 rounded bg-gray-700 border-gray-600">
                    <label for="low-vram-mode" class="text-xs text-yellow-500 font-bold cursor-pointer select-none">
                        ⚠️ 低显存模式 (勾选后需手动点下一步)
                    </label>
                </div>

                <!-- 改图模式开关 -->
                <div class="mb-3 flex items-center">
                    <input type="checkbox" id="review-mode-toggle" class="mr-2 h-4 w-4 text-blue-600 rounded bg-gray-700 border-gray-600">
                    <label for="review-mode-toggle" class="text-xs text-orange-500 font-bold cursor-pointer select-none">
                        ⚡ 改图模式 (生成完图片后暂停检查)
                    </label>
                </div>

                <!-- 新增：步骤2 配置面板 -->
                <div class="mb-4 bg-gray-800 p-3 rounded-lg border border-gray-700 mt-2">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex flex-col">
                            <label class="text-xs text-blue-400 font-bold mb-1 whitespace-nowrap">🎨 文生图模型 (Checkpoint)</label>
                            <select id="t2i-model-select" class="w-full bg-gray-900 text-white text-xs p-2 rounded border border-gray-600 focus:outline-none focus:border-blue-500">
                                <option value="z_image_turbo_a">Z-Image-Turbo (A版)</option>
                                <option value="z_image_turbo">Z-Image-Turbo (普通版)</option>
                                <option value="nunchaku_qwen">Nunchaku + Qwen</option>
                                <option value="z_image_gguf">GGUF (低显存/8G以下)</option>
                            </select>
                        </div>

                        <div class="flex flex-col">
                            <label class="text-xs text-green-400 font-bold mb-1 whitespace-nowrap">📐 视频分辨率 (Wan2.1)</label>
                            <select id="i2v-resolution-select" class="w-full bg-gray-900 text-white text-xs p-2 rounded border border-gray-600">
                                <option value="480p_vertical" selected>480P 竖屏 (480x832) - 极速</option>
                                <option value="480p_horizontal">480P 横屏 (832x480) - 极速</option>
                                <option value="720p_vertical">720P 竖屏 (720x1280) - 高清</option>
                                <option value="720p_horizontal">720P 横屏 (1280x720) - 高清</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex items-center gap-4 mt-3 pt-2 border-t border-gray-700">

async function fetchModels() {
    const provider = document.getElementById('llm-provider').value;
    const baseUrl = document.getElementById('llm-url').value.replace(/\/$/, '');
    const apiKey = document.getElementById('llm-api-key').value;
    const modelSelect = document.getElementById('llm-model');
    
    modelSelect.innerHTML = '<option value="">加载中...</option>';
    
    try {
        let models = [];
        
        if (provider === 'ollama') {
            // Ollama API
            const res = await fetch(`${baseUrl}/api/tags`);
            const data = await res.json();
            models = data.models?.map(m => m.name) || [];
            
        } else if (provider === 'lmstudio' || provider === 'vllm' || provider === 'remote-vllm' || provider === 'deepseek' || provider === 'custom') {
            // OpenAI 兼容 API (包含 vLLM / Remote vLLM / DeepSeek)
            const headers = { 'Content-Type': 'application/json' };
            if (apiKey) headers['Authorization'] = `Bearer ${apiKey}`;
            
            // 关键修改：明确指定 remote-vllm 使用 /v1/models
            let endpoint;
            if (provider === 'deepseek') {
                endpoint = `${baseUrl}/models`;
            } else if (provider === 'vllm' || provider === 'remote-vllm') {
                endpoint = `${baseUrl}/v1/models`;
            } else {
                // 默认兜底
                endpoint = `${baseUrl}/v1/models`;
            }
            const res = await fetch(endpoint, { headers });
            const data = await res.json();
            models = data.data?.map(m => m.id) || [];
        }
        
        if (models.length === 0) {
            modelSelect.innerHTML = '<option value="">未找到模型</option>';
            log('warn', '未获取到模型列表');
            return;
        }
        
        modelSelect.innerHTML = models.map(m => `<option value="${m}">${m}</option>`).join('');
        log('success', `获取到 ${models.length} 个模型`);
        
    } catch (e) {
        modelSelect.innerHTML = '<option value="">获取失败</option>';

// 流式调用LLM
async function callLLMStream(userContent, systemPrompt, onChunk = null) {
    const provider = document.getElementById('llm-provider').value;
    const baseUrl = document.getElementById('llm-url').value.replace(/\/$/, '');
    const apiKey = document.getElementById('llm-api-key').value;
    const model = document.getElementById('llm-model').value;
    
    if (!model) throw new Error('请先选择模型');
    
    // 清空并开始
    clearLLMOutput();
    setLLMStatus('生成中...');
    
    let fullResponse = '';
    
    if (provider === 'ollama') {
        // Ollama 流式 API
        const response = await fetch(`${baseUrl}/api/generate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: model,
                prompt: `${systemPrompt}\n\n用户输入：${userContent}`,
                stream: true,
                options: { temperature: 0.7 }
            })
        });
        
        if (!response.ok) throw new Error('Ollama 调用失败');
        
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            const chunk = decoder.decode(value);
            const lines = chunk.split('\n').filter(line => line.trim());
            
            for (const line of lines) {
                try {
                    const data = JSON.parse(line);
                    if (data.response) {
                        fullResponse += data.response;
                        updateLLMOutput(data.response, true);
                        if (onChunk) onChunk(data.response);
                    }
                } catch (e) {
                    // 忽略解析错误
                }
            }
        }
        
    } else {
        // OpenAI 兼容 API 流式 (LM Studio / vLLM / Remote vLLM / DeepSeek / 自定义)
        const headers = { 'Content-Type': 'application/json' };
        if (apiKey) headers['Authorization'] = `Bearer ${apiKey}`;
        
        // 关键修改：确保 vLLM 明确走 v1 路径
        let endpoint;
        if (provider === 'deepseek') {
            endpoint = `${baseUrl}/chat/completions`;
        } else if (provider === 'vllm' || provider === 'remote-vllm') {
            endpoint = `${baseUrl}/v1/chat/completions`;
        } else {
            endpoint = `${baseUrl}/v1/chat/completions`;
        }
        
        const response = await fetch(endpoint, {
            method: 'POST',
            headers: headers,
            body: JSON.stringify({
                model: model,
                messages: [
                    { role: 'system', content: systemPrompt },
                    { role: 'user', content: userContent }
                ],
                temperature: 0.7,
                stream: true
            })
        });
        
        if (!response.ok) throw new Error(`LLM 调用失败: ${response.status}`);
        
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            const chunk = decoder.decode(value);
            const lines = chunk.split('\n').filter(line => line.trim());
            
            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    const data = line.slice(6);
                    if (data === '[DONE]') continue;
                    
                    try {
                        const json = JSON.parse(data);
                        const content = json.choices?.[0]?.delta?.content || '';
                        if (content) {
                            fullResponse += content;
                            updateLLMOutput(content, true);
                            if (onChunk) onChunk(content);
                        }
                    } catch (e) {
                        // 忽略解析错误
                    }
                }
            }
        }
    }
    
    setLLMStatus('完成');
    return fullResponse;
}

// ==================== LLM 调用（支持多提供者）====================
async function callLLM(userContent, systemPrompt) {
    return await callLLMStream(userContent, systemPrompt);
}

function blobToBase64(blob) {
    return new Promise((resolve, _) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.readAsDataURL(blob);
    });
}

async function uploadImageToComfy(blob, filename) {
    const formData = new FormData();
    formData.append('image', blob, filename);
    formData.append('overwrite', 'true');

    try {
        const res = await fetch(`${CONFIG.comfyui.url}/upload/image`, {
            method: 'POST',
            body: formData
        });
        if (!res.ok) throw new Error("上传失败");
        const data = await res.json();
        return data.name;
    } catch (e) {
        throw new Error(`ComfyUI 图片上传错误: ${e.message}`);
    }
}

async function executeComfyWorkFlow(workflow, outputType = 'image') {
    const clientId = "client_" + new Date().getTime();
    
    const promptRes = await fetch(`${CONFIG.comfyui.url}/prompt`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: workflow, client_id: clientId })
    });
    const { prompt_id } = await promptRes.json();

    return new Promise((resolve, reject) => {
        const socket = new WebSocket(`ws://${CONFIG.comfyui.url.replace('http://', '').replace('https://', '')}/ws?clientId=${clientId}`);
        
        socket.onmessage = async (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'executing' && msg.data.node === null && msg.data.prompt_id === prompt_id) {
                socket.close();
                const history = await (await fetch(`${CONFIG.comfyui.url}/history/${prompt_id}`)).json();
                const outputs = history[prompt_id].outputs;
                
                for (const nodeId in outputs) {
                    const out = outputs[nodeId];
                    let file = null;
                    
                    if (outputType === 'image' && out.images) file = out.images[0];
                    else if (outputType === 'video' && (out.videos || out.gifs)) file = (out.videos && out.videos.length) ? out.videos[0] : out.gifs[0];

                    if (file) {
                        const blob = await (await fetch(`${CONFIG.comfyui.url}/view?filename=${file.filename}&subfolder=${file.subfolder}&type=${file.type}`)).blob();
                        resolve(blob);
                        return;
                    }
                }
                reject(new Error("未找到生成结果"));
            }
        };
    });
}

function updateGridLayout() {
    const imageSize = document.getElementById('image-size').value;
    const container = document.getElementById('shots-container');
    
    if (!container) return;
    
    const [width, height] = imageSize.split('x').map(Number);
    const isHorizontal = width >= height;
    
    container.classList.remove('grid-layout-horizontal', 'grid-layout-vertical');
    container.classList.add(isHorizontal ? 'grid-layout-horizontal' : 'grid-layout-vertical');
    
    const aspectClass = isHorizontal ? 'aspect-horizontal' : 'aspect-vertical';
    const removeClass = isHorizontal ? 'aspect-vertical' : 'aspect-horizontal';
    
    document.querySelectorAll('.shot-card img').forEach(img => {
        img.classList.remove(removeClass);
        img.classList.add(aspectClass);
    });
}

function cleanLLMPrompt(response) {
    if (!response || typeof response !== 'string') return '';
    
    let cleaned = response.trim();
    
    cleaned = cleaned.replace(/```json\s*/g, '');
    cleaned = cleaned.replace(/```\s*/g, '');
    cleaned = cleaned.replace(/```prompt\s*/g, '');
    cleaned = cleaned.replace(/```text\s*/g, '');
    
    const patterns = [
        /修改后的[提示词]?[：:]\s*/i,
        /重写后的[提示词]?[：:]\s*/i,
        /新的[提示词]?[：:]\s*/i,
        /更新后的[提示词]?[：:]\s*/i,
        /输出[：:]\s*/i,
        /result[：:]\s*/i,
        /output[：:]\s*/i,
        /prompt[：:]\s*/i,
    ];
    
    for (const pattern of patterns) {
        cleaned = cleaned.replace(pattern, '');
    }
    
    const explanationPatterns = [
        /\n[^\n]*?解释[^\n]*/g,
        /\n[^\n]*?说明[^\n]*/g,
        /\n[^\n]*?备注[^\n]*/g,
        /\n[^\n]*?note[^\n]*/gi,
        /\n[^\n]*?explanation[^\n]*/gi,
        /\n[^\n]*?以上[^\n]*/g,
    ];
    
    for (const pattern of explanationPatterns) {
        cleaned = cleaned.replace(pattern, '');
    }
    
    cleaned = cleaned.replace(/\n+/g, '');
    cleaned = cleaned.replace(/\s+/g, ' ');
    
    return cleaned.trim();
}

async function regenerateShot(index, newPrompt, isRedraw = false) {
    if (STATE.isRegenerating) {
        alert('正在生成中，请稍候...');
        return;
    }
    
    if (index === null || index === undefined || !STATE.shots[index]) {
        console.error("镜头索引无效:", index);
        alert("镜头数据丢失，请重新打开弹窗");
        return;
    }

    STATE.isRegenerating = true;
    const shot = STATE.shots[index];
    
    const modalImg = document.getElementById('modal-image-preview');
    const confirmBtn = document.querySelector('#review-modal button.bg-gradient-to-r');
    const originalBtnText = confirmBtn ? confirmBtn.innerText : '';
    
    if(confirmBtn) {
        confirmBtn.innerText = "⏳ 生成中...";
        confirmBtn.disabled = true;
    }

    log('info', `🔄 开始重新生成镜头 ${index+1}...`);
    
    try {
        const editMode = document.querySelector('input[name="edit-mode"]:checked').value;
        let blob;
        
        if (editMode === 'edit') {
            blob = await callQwenEditWorkflow(shot.imageBlob, newPrompt);
        } else {
            let width = 960, height = 544;
            const resSelect = document.getElementById('image-size');
            if (resSelect && resSelect.value) {
                const parts = resSelect.value.split('x');
                if (parts.length === 2) {
                    width = parseInt(parts[0]);
                    height = parseInt(parts[1]);
                }
            }
            
            const modelKey = document.getElementById('t2i-model-select').value;
            blob = await callComfyUIWithModel(newPrompt, width, height, modelKey);
        }
        
        await saveToServer('image', index, await blobToBase64(blob));
        
        shot.imageBlob = blob;
        shot.visual_prompt = newPrompt;
        
        const imgUrl = URL.createObjectURL(blob);

        const listImg = document.querySelector(`#img-${shot.id}`) || document.getElementById(`shot-card-${shot.id}`)?.querySelector('img');
        if (listImg) {
            listImg.src = imgUrl;
        }

        if (modalImg) {
            modalImg.src = imgUrl;
            modalImg.style.opacity = '0.5';
            setTimeout(() => modalImg.style.opacity = '1', 200);
        }
        
        log('success', `✅ 镜头 ${index+1} 重新生成完成`);
    } catch (e) {
        log('error', `❌ 镜头 ${index+1} 重新生成失败: ${e.message}`);
        alert(`重新生成失败: ${e.message}`);
    } finally {
        STATE.isRegenerating = false;
        if(confirmBtn) {
            confirmBtn.innerText = originalBtnText || "开始重绘";
            confirmBtn.disabled = false;
        }
    }
}

async function generateTTSAudio(text, options = {}) {
    const ttsUrl = document.getElementById('tts-url')?.value || CONFIG.cosyvoice.url || "http://127.0.0.1:7860";
    
    const formData = new FormData();
    formData.append('text', text);
    
    const audioSource = document.querySelector('input[name="tts-audio-source"]:checked')?.value || 'default';
    
    if (audioSource === 'server') {
        const serverAudio = document.getElementById('tts-ref-audio')?.value;
        const promptTextEl = document.getElementById('tts-prompt-text');
        const promptText = promptTextEl?.value || promptTextEl?.dataset.autoText || '';
        
        if (serverAudio) {
            formData.append('prompt_audio_name', serverAudio);
            if (promptText) {
                formData.append('prompt_text', promptText);
            }
        }
    } else if (audioSource === 'upload') {
        const uploadFile = document.getElementById('tts-upload-audio')?.files[0];
        const uploadText = document.getElementById('tts-upload-text')?.value?.trim();
        
        if (uploadFile) {
            formData.append('prompt_audio', uploadFile);
            if (uploadText) {
                formData.append('prompt_text', uploadText);
            }
        }
    }
    
    const mode = document.getElementById('tts-mode')?.value || 'zero_shot';
    formData.append('mode', mode);
    
    const response = await fetch(`${ttsUrl}/api/tts`, {
        method: 'POST',
        body: formData
    });
    
    if (!response.ok) {
        const errorData = await response.json().catch(() => ({ detail: response.statusText }));
        throw new Error(errorData.detail || `HTTP ${response.status}`);
    }
    
    const audioBlob = await response.blob();
    const audioDuration = parseFloat(response.headers.get('X-Audio-Duration')) || 0;
    
    return {
        blob: audioBlob,
        duration: audioDuration
    };
}

function toggleTTSAudioSource() {
    const source = document.querySelector('input[name="tts-audio-source"]:checked')?.value || 'default';
    
    const serverSection = document.getElementById('tts-server-section');
    const serverTextSection = document.getElementById('tts-server-text-section');
    const uploadSection = document.getElementById('tts-upload-section');
    
    if (source === 'server') {
        serverSection.classList.remove('hidden');
        serverTextSection.classList.remove('hidden');
        uploadSection.classList.add('hidden');
    } else if (source === 'upload') {
        serverSection.classList.add('hidden');
        serverTextSection.classList.add('hidden');
        uploadSection.classList.remove('hidden');
    } else {
        serverSection.classList.add('hidden');
        serverTextSection.classList.add('hidden');
        uploadSection.classList.add('hidden');
    }
}

async function runStep1() {
    const rawText = document.getElementById('input-story').value.trim();
    if (!rawText) return log('error', '请输入故事文本');

    if (!await checkLowVram('step1_start')) return;
    
    // 1. 设定项目名称 (解决保存路径问题)
    const isBatch = document.getElementById('batch-mode-toggle')?.checked;
    if (isBatch) {
        // 批量模式由外部控制
    } else {
        // 单篇模式：生成唯一项目名
        STATE.projectName = `Project_${new Date().getTime()}`; 
        log('info', `📁 项目名称已设定: ${STATE.projectName}`);
    }

    const btn = document.getElementById('btn-step1');
    btn.disabled = true;
    btn.classList.add('active');

    try {
        // ========== 1. 角色提取 (Danbooru) ==========
        updateProgress('提取角色...', 10);
        let roles = [];
        try {
            const roleJson = await callLLM(rawText, PROMPTS.ROLE_EXTRACT); 
            // 简单的JSON清洗
            const cleanJson = roleJson.replace(/```json/g, '').replace(/```/g, '').trim();
            const match = cleanJson.match(/\[[\s\S]*\]/);
            if (match) {
                roles = JSON.parse(match[0]);
                // 保存角色到服务器
                for(let r of roles) await saveToServer('role', 0, r);
                log('success', `提取到 ${roles.length} 个角色`);
            }
        } catch(e) { log('warn', '角色提取解析失败，将使用通用设定'); }
        STATE.characters = roles;

        // ========== 2. 智能改写 (Perfectoo 逻辑) ==========
        let processedText = rawText;
        const isLyrics = document.getElementById('is-lyrics')?.checked;
        const skipRewrite = document.getElementById('skip-rewrite')?.checked;

        if (!skipRewrite && !isLyrics) {
            updateProgress('智能改写...', 30);
            processedText = await callLLM(rawText, PROMPTS.REWRITE);
            log('info', '改写完成');
        }

        // ========== 3. 镜头拆分 (混合调度机制：断长补短) ==========
        updateProgress('拆分镜头...', 50);
        let rawSentences = [];
        
        if (isLyrics) {
            rawSentences = rawText.split('\n').map(l => l.trim()).filter(l => l);
        } else {
            const splitRes = await callLLM(processedText, PROMPTS.SPLIT_SENTENCES);
            
            const dirtyLines = splitRes.split('|||');
            let temp = [];
            
            const blackList = [
                "他端起茶杯", "输出示例", "分镜剧本", "JSON", "Example", 
                "【", "】", "Visual Prompt", "镜头1"
            ];

            for (let rawLine of dirtyLines) {
                let cleanLine = rawLine.replace(/^(镜头|场景|第)?\s*\d+(描述)?[:：\.]?\s*/g, '').trim();
                
                let isDirty = blackList.some(keyword => cleanLine.includes(keyword));
                
                if (cleanLine === "他端起茶杯抿了一口") isDirty = true;

                if (cleanLine && cleanLine.length > 1 && !isDirty) {
                    temp.push(cleanLine);
                }
            }
            
            for (let s of temp) {
                if (s.length > 45 && /[,，。]/.test(s)) {
                    rawSentences.push(...s.split(/[,，。]/).filter(p => p.trim().length > 1));
                } else {
                    rawSentences.push(s);
                }
            }
        }

        // 3. 【核心修正】短句贪婪合并 (强制底线 15 字)
        // 逻辑：如果当前句不够长，就一直往下一句吃，直到够长或没有下一句为止
        let sentences = [];
        if (isLyrics) {
            sentences = rawSentences;
        } else {
            for (let i = 0; i < rawSentences.length; i++) {
                let current = rawSentences[i];
                // 只要当前句小于15字，且后面还有句子，就合并
                while (current.length < 15 && i + 1 < rawSentences.length) {
                    current += "，" + rawSentences[i+1];
                    i++; // 跳过被合并的下一句
                }
                sentences.push(current);
            }
        }
        
        log('info', `最终分镜：合并优化后共 ${sentences.length} 镜`);

        // ========== 4. 导演生成 Prompt (解决报错的关键！) ==========
        updateProgress('导演规划中...', 70);
        STATE.shots = [];
        let prevShot = "无(首镜)";
        
        const style = document.getElementById('style-desc').value;
        const bg = document.getElementById('context-bg').value;
        const roleInfoStr = roles.map(r=>`${r.name}: ${r.tags}`).join('\n');

        if (isLyrics) {
            log('info', '启用歌词模式：按行拆分，不改写...');
            
            for (let i = 0; i < sentences.length; i++) {
                const txt = sentences[i];
                
                const promptTemplate = PROMPTS.IMAGE_GEN_FUNC(style, bg, roleInfoStr, txt, prevShot);
                let finalPrompt = await callLLM(txt, promptTemplate);
                finalPrompt = finalPrompt.replace(/```/g, '').trim();
                prevShot = finalPrompt.substring(0, 100);
                
                STATE.shots.push({
                    id: `shot_${i}`,
                    index: i,
                    narration: txt,
                    visual_prompt: finalPrompt,
                    text: txt
                });
                
                log('info', `镜头${i+1}: ${finalPrompt.substring(0,30)}...`);
            }
            
            renderShots();
            log('success', `歌词模式处理完成：共 ${STATE.shots.length} 个分镜`);
            
            btn.classList.remove('active');
            btn.classList.add('completed');
            document.getElementById('btn-step2').disabled = false;
            
            if (!document.getElementById('low-vram-mode').checked && !isBatch) {
                log('info', '🚀 自动启动步骤2...');
                setTimeout(runStep2, 1000);
            }
            return;
        }

        for (let i = 0; i < sentences.length; i++) {
            const txt = sentences[i];
            updateProgress(`导演规划 ${i+1}/${sentences.length}`, 70 + (i/sentences.length)*20);
            
            // 【关键修改】这里是调用 LLM，而不是直接拼接字符串
            const promptTemplate = PROMPTS.IMAGE_GEN_FUNC(style, bg, roleInfoStr, txt, prevShot);
            let finalPrompt = await callLLM(txt, promptTemplate); // 发送给LLM
            
            // 清理可能多余的符号
            finalPrompt = finalPrompt.replace(/```/g, '').trim();

            // 记录上一镜，用于下一镜的对抗生成
            prevShot = finalPrompt.substring(0, 100); 

            STATE.shots.push({
                id: `shot_${i}`,
                index: i,
                narration: txt, // 旁白
                visual_prompt: finalPrompt, // 画面提示词
                text: txt // 兼容字段
            });
            
            log('info', `镜头${i+1}: ${finalPrompt.substring(0,30)}...`);
        }

        renderShots(); // 更新UI列表
        
        log('success', `✅ 步骤1完成`);
        
        btn.classList.remove('active');
        btn.classList.add('completed');
        document.getElementById('btn-step2').disabled = false;

        // 【全自动逻辑】非低显存模式 + 非批量模式 -> 自动下一步
        if (!document.getElementById('low-vram-mode').checked && !isBatch) {
            log('info', '🚀 自动启动步骤2...');
            setTimeout(runStep2, 1000);
        }

    } catch (e) {
        log('error', `步骤1失败: ${e.message}`);
        console.error(e);
        btn.disabled = false;
        btn.classList.remove('active');
    }
}

// 2. 这里的 callComfyUI 只认上面的 FINAL_GGUF_WORKFLOW
async function callComfyUI(promptText, width, height) {
    const workflow = JSON.parse(JSON.stringify(FINAL_GGUF_WORKFLOW));

    workflow["4"].inputs.seed = Math.floor(Math.random() * 1000000000000000);

    workflow["5"].inputs.text = promptText;

    workflow["7"].inputs.width = width;
    workflow["7"].inputs.height = height;

    console.log("正在发送工作流，Node 4 类型:", workflow["4"].class_type);

    const res = await fetch(`${CONFIG.comfyui.url}/prompt`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: workflow })
    });

    if (!res.ok) {
        const err = await res.text();
        throw new Error(`ComfyUI 拒绝请求: ${err}`);
    }

    const data = await res.json();
    const prompt_id = data.prompt_id;

    return new Promise((resolve, reject) => {
        let attempts = 0;
        const check = setInterval(async () => {
            attempts++;
            if (attempts > 300) { 
                clearInterval(check); 
                reject(new Error("超时")); 
            }
            try {
                const hRes = await fetch(`${CONFIG.comfyui.url}/history/${prompt_id}`);
                const hData = await hRes.json();
                
                if (hData[prompt_id] && hData[prompt_id].outputs) {
                    const outputs = hData[prompt_id].outputs;
                    
                    let images = null;
                    if (outputs["24"] && outputs["24"].images) {
                        images = outputs["24"].images;
                    } else {
                        for (let k in outputs) {
                            if (outputs[k].images) {
                                images = outputs[k].images;
                                break;
                            }
                        }
                    }

                    if (images && images.length > 0) {
                        clearInterval(check);
                        const img = images[0];
                        const url = `${CONFIG.comfyui.url}/view?filename=${img.filename}&subfolder=${img.subfolder}&type=${img.type}`;
                        const bRes = await fetch(url);
                        resolve(await bRes.blob());
                    }
                }
            } catch(e) {}
        }, 1000);
    });
}

// 静音生成器 (保命符，防止没有 createSilentWav 函数)
function createSilentWav(durationSeconds=5) {
    const sampleRate=44100, numChannels=1, bitsPerSample=16;
    const blockAlign=numChannels*bitsPerSample/8, byteRate=sampleRate*blockAlign;
    const dataSize=sampleRate*durationSeconds*blockAlign;
    const buffer=new ArrayBuffer(44+dataSize), view=new DataView(buffer);
    function s(o,s){for(let i=0;i<s.length;i++)view.setUint8(o+i,s.charCodeAt(i))}
    s(0,'RIFF'); view.setUint32(4,36+dataSize,true); s(8,'WAVE'); s(12,'fmt ');
    view.setUint32(16,16,true); view.setUint16(20,1,true); view.setUint16(22,numChannels,true);
    view.setUint32(24,sampleRate,true); view.setUint32(28,byteRate,true);
    view.setUint16(32,blockAlign,true); view.setUint16(34,bitsPerSample,true);
    s(36,'data'); view.setUint32(40,dataSize,true);
    return new Blob([view],{type:'audio/wav'});
}

// Blob转Base64
async function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => {
            const base64 = reader.result.split(',')[1];
            resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(blob);
    });
}

async function saveToServer(type, index, content) {
    if (!STATE.projectName) {
        STATE.projectName = `Project_${new Date().getTime()}`;

        body: JSON.stringify({
            projectName,
            isBatch,
            batchTaskName,
            type,
            index,
            content
        })
    });
    return res.json();
}

async function processRoles(roles) {
    if (document.getElementById('batch-mode-toggle').checked) {
        const batchTaskName = document.getElementById('batch-task-name').value || "MyBatchTask";
        for (let r of roles) {
            const check = await fetch(`${CONFIG.composeServer.url}/check_role`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: r.name,
                    isBatch: true,
                    batchTaskName: batchTaskName
                })
            }).then(res => res.json());

            if (check.exists) {
                r.tags = check.description;
                log('info', `♻️ 复用角色设定: ${r.name}`);
            } else {
                await saveToServer('role', 0, r);
            }
        }
    } else {
        for (let r of roles) await saveToServer('role', 0, r);
    }
}

async function startProcess() {
    const isBatch = document.getElementById('batch-mode-toggle').checked;
    
    if (isBatch) {
        const res = await fetch(`${CONFIG.composeServer.url}/scan_batch`);
        const data = await res.json();
        
        if (data.count === 0) {
            log('error', 'output/batch_input 文件夹为空');
            return;
        }
        
        log('info', `📦 检测到 ${data.count} 个批量任务，开始自动执行...`);
        
        for (let i = 0; i < data.files.length; i++) {
            const file = data.files[i];
            STATE.currentBatchFile = file.filename;
            log('info', `🚀 开始处理第 ${i+1}/${data.count} 篇: ${file.filename}`);
            
            document.getElementById('input-story').value = file.content;
            
            await runStep1();
            await runStep2();
            await runStep3();
            await runStep4();
            
            resetState();
        }
        log('success', '🎉 所有批量任务执行完毕！');
    } else {
        await runStep1();
    }
}

                const systemPrompt = `你是专业的AI绘画提示词工程师。请根据新的风格描述和时空背景，更新以下Prompt。
【强制设定】
风格：${styleDesc}

${originalPrompt}
【规则】
1. 必须严格遵守以下结构格式：
   [风格描述]，[环境背景]，<景别>，<拍摄角度>，<具体环境细节>，[画面<位置>的角色（Danbooru标签）<动作>]，<光影描述>

【输出】
只输出修改后的Prompt字符串，不要任何解释。`;
                
                try {
                    const newPrompt = await callLLM(originalPrompt, systemPrompt);
                    const cleanedPrompt = cleanLLMPrompt(newPrompt);
                    
                    if (cleanedPrompt && cleanedPrompt.length >= 10) {
                        shot.visual_prompt = cleanedPrompt;

                    log('warn', `⚠️ 镜头 ${i+1} Prompt更新失败: ${e.message}，使用原Prompt`);

        log('info', '开始重新生成所有图片...');

    <div class="bg-gray-900 rounded-xl max-w-6xl w-full max-h-[90vh] overflow-hidden flex flex-col">
        <div class="flex justify-between items-center p-4 border-b border-gray-700">
            <h3 class="text-xl font-bold text-white">🖼️ 图片预览与修正</h3>
            <button onclick="closeReviewModal()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-6">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- 左侧：图片预览区 -->
                <div class="flex flex-col">
                    <h4 class="text-sm font-bold text-gray-400 mb-3">📸 图片预览</h4>
                    <div class="bg-gray-800 rounded-lg overflow-hidden flex-1 flex items-center justify-center min-h-[400px]">
                        <img id="modal-image-preview" src="" alt="预览" class="max-w-full max-h-[500px] object-contain">
                    </div>
                </div>
                
                <!-- 右侧：修改工具区 -->
                <div class="flex flex-col gap-4">
                    <!-- 模式选择 -->
                    <div>
                        <h4 class="text-sm font-bold text-gray-400 mb-2">🎯 改图模式</h4>
                        <div class="flex gap-2">
                            <label class="flex items-center cursor-pointer flex-1">
                                <input type="radio" name="edit-mode" value="normal" checked class="w-4 h-4 text-blue-600 bg-gray-700 border-gray-600 focus:ring-blue-500">
                                <span class="ml-2 text-xs text-gray-300">普通模式</span>
                            </label>
                            <label class="flex items-center cursor-pointer flex-1">
                                <input type="radio" name="edit-mode" value="edit" class="w-4 h-4 text-purple-600 bg-gray-700 border-gray-600 focus:ring-purple-500">
                                <span class="ml-2 text-xs text-gray-300">编辑模式</span>
                            </label>
                        </div>
                    </div>
                    
                    <!-- 当前Prompt显示 -->
                    <div id="current-prompt-section">
                        <h4 class="text-sm font-bold text-gray-400 mb-2">📝 当前Prompt</h4>
                        <textarea id="modal-current-prompt" readonly 
                            class="w-full h-24 bg-gray-800 text-gray-300 text-xs rounded-lg p-3 border border-gray-700 resize-none"></textarea>
                    </div>
                    
                    <!-- 修改意见输入 -->
                    <div>
                        <h4 class="text-sm font-bold text-gray-400 mb-2">✏️ 修改意见</h4>
                        <textarea id="modal-feedback" placeholder="普通模式：请输入您的修改意见，例如：把背景换成赛博朋克风格...&#10;编辑模式：请输入修改指令，例如：改成正确的车内视角"
                            class="w-full h-20 bg-gray-700 text-white text-sm rounded-lg p-3 border border-gray-600 focus:border-blue-500 outline-none resize-none"></textarea>
                    </div>
                    
                    <!-- 快捷修正按钮组（仅普通模式显示） -->
                    <div id="quick-fix-section">
                        <h4 class="text-sm font-bold text-gray-400 mb-2">⚡ 快捷修正</h4>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="handleQuickFix('character')" class="px-3 py-2 bg-red-600/20 hover:bg-red-600/30 text-red-400 rounded-lg text-xs font-bold border border-red-600/50">
                                👤 角色错误
                            </button>
                            <button onclick="handleQuickFix('environment')" class="px-3 py-2 bg-blue-600/20 hover:bg-blue-600/30 text-blue-400 rounded-lg text-xs font-bold border border-blue-600/50">
                                🏠 环境错误
                            </button>
                            <button onclick="handleQuickFix('era')" class="px-3 py-2 bg-yellow-600/20 hover:bg-yellow-600/30 text-yellow-400 rounded-lg text-xs font-bold border border-yellow-600/50">
                                📜 时代错误
                            </button>
                            <button onclick="handleQuickFix('composition')" class="px-3 py-2 bg-purple-600/20 hover:bg-purple-600/30 text-purple-400 rounded-lg text-xs font-bold border border-purple-600/50">
                                🎬 构图/景别错误
                            </button>
                            <button onclick="handleQuickFix('style')" class="px-3 py-2 bg-green-600/20 hover:bg-green-600/30 text-green-400 rounded-lg text-xs font-bold border border-green-600/50 col-span-2">
                                🎨 风格崩坏
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 底部操作按钮 -->
        <div class="flex justify-end gap-3 p-4 border-t border-gray-700">
            <button onclick="closeReviewModal()" class="px-6 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-lg font-bold">
                取消
            </button>
            <button id="btn-redraw" onclick="handleRedraw()" class="px-6 py-2 bg-gradient-to-r from-orange-600 to-red-600 hover:from-orange-700 hover:to-red-700 text-white rounded-lg font-bold hidden">
                🔄 重绘
            </button>
            <button onclick="confirmRegenerate()" class="px-6 py-2 bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 text-white rounded-lg font-bold">
                ✅ 确认修改并重新生成
            </button>
        </div>
    </div>
</div>
</body>
</html>
